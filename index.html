<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Расходы — Наталия</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Мои расходы</h1>

<div class="summary">
  <div>Всего: <span id="total">0 ₽</span></div>
  <div>Бизнес: <span id="businessTotal">0 ₽</span></div>
  <div>Личное: <span id="personalTotal">0 ₽</span></div>
</div>

<button id="addBtn">Добавить расход</button>

<div id="formBlock" class="hidden">
  <h3>Новый расход</h3>

  <label>Тип:</label>
  <select id="kind">
    <option value="business">Бизнес</option>
    <option value="personal">Личное</option>
  </select>

  <label>Категория:</label>
  <select id="category"></select>

  <label>Сумма:</label>
  <input type="number" id="amount" placeholder="Введите сумму">

  <label>Комментарий:</label>
  <input type="text" id="note" placeholder="Необязательно">

  <button id="saveBtn">Сохранить</button>
</div>

<ul id="list"></ul>

<script src="app.js"></script>
</body>
</html>
